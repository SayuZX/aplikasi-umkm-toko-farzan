appId: com.posumkm.app
productName: TOKO FARZAN
directories:
  output: release
  buildResources: assets
asar: true
asarUnpack:
  - "**/*.node"
publish:
  provider: github
  owner: SayuZX
  repo: aplikasi-umkm-toko-farzan
files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!node_modules/**/__tests__/**"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/*.map"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.ts"
  - "!node_modules/**/LICENSE*"
  - "!node_modules/**/CHANGELOG*"
extraResources:
  - from: ../server
    to: server
    filter:
      - "**/*"
      - "!node_modules/.cache/**"
      - "!storage/logs/**"
      - "!storage/uploads/**"
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/icon.png
  category: Office
  description: Aplicasi Point of Sale untuk UMKM
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  license: LICENSE.txt
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  shortcutName: TOKO FARZAN
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerLanguages:
    - en
